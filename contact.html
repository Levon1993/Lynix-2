<body class="page contact-page">

<header>
  <nav>
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Lynix AI Logo">
    </a>

    <div class="hamburger" id="hamburger">
      <span></span>

    <ul>
      <li><a href="index.html">Start</a></li>
      <li><a href="about.html">Über uns</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html" class="active">Kontakt</a></li>
    </ul>

  <div class="hero">
    <h1 class="animated-text">Kontaktieren Sie uns</h1>

  </div>

  <div class="scroll-down" id="scrollBtn">

</header>

<section class="contact-form">
  <div class="animated-card">

    <iframe 
      data-tally-src="https://tally.so/embed/vGLOO8?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
      loading="lazy"
      width="100%"
      height="600"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="Kontaktformular">
    </iframe>

    <button class="btn" data-tally-open="DEIN_FEEDBACK_FORMULAR">
  Feedback geben
</button>

<script async src="https://tally.so/widgets/embed.js"></script>
  </div>
</section>

<footer>
  <p>
    &copy; 2026 Lynix AI
    <a href="impressum.html">Impressum</a> |
    <a href="agb.html">AGB</a>
  </p>
</footer>

<script src="script.js"></script>

<script>
var d=document,w="https://tally.so/widgets/embed.js",v=function(){
  if(typeof Tally!=="undefined"){Tally.loadEmbeds();}
  else{
    d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){
      e.src=e.dataset.tallySrc;
    });
  }
};
if(typeof Tally!=="undefined"){v();}
else if(d.querySelector('script[src="'+w+'"]')==null){
  var s=d.createElement("script");
  s.src=w;
  s.onload=v;
  s.onerror=v;
  d.body.appendChild(s);
}
</script>

<script src="//code.tidio.co/tw6kow2mch1fa9wt641dgrq0m3jitlnj.js" async></script>
